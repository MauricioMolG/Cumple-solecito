<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para Solecito ☀️</title>

    <link rel="stylesheet" href="css/style1.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&display=swap" rel="stylesheet">
    
</head>

<body>

    <canvas id="sky"></canvas>

    <div id="gift">

        <div class="box">

            <div class="ribbon-vertical"></div>

        </div>

        <div class="lid">

            <div class="ribbon-horizontal"></div>

            <div class="bow">

                <div class="bow-left"></div>

                <div class="bow-center"></div>

                <div class="bow-right"></div>

            </div>

        </div>

    </div>

    <!-- FUERA DEL REGALO -->
    <div id="birthday">

        <div class="feliz">

            FELIZ

        </div>

        <div class="cumple">

            <span>C</span>
            <span>U</span>
            <span>M</span>
            <span>P</span>
            <span>L</span>
            <span>E</span>
            <span>A</span>
            <span>Ñ</span>
            <span>O</span>
            <span>S</span>

        </div>

        <div class="solecito">

            SOLECITO ☀️

        </div>

        <div id="cake">

            <div class="cake-bottom"></div>

            <div class="icing-bottom"></div>

            <div class="cake-top"></div>

            <div class="icing-top"></div>

            <div class="candle c1">
                <div class="flame"></div>
            </div>

            <div class="candle c2">
                <div class="flame"></div>
            </div>

            <div class="candle c3">
                <div class="flame"></div>
            </div>

        </div>

    </div>

    <!-- FUERA DEL REGALO -->

    <div id="balloons"></div>

    <div id="modal">

        <div id="modal-content">

            <button id="close-modal">

                ✕

            </button>

            <div id="modal-body"></div>

        </div>

    </div>

    <script src="js/main1.js"></script>

</body>

</html>
